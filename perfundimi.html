<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Përfundimi — llojet 20/20</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --line:#2a2f3a; --txt:#e7e9ee; --mut:#9aa3b2; --acc:#6ea8fe; --good:#4fbf85; --warn:#f0b866; --p:#b794f6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:16px/1.6 system-ui,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:1000px; margin:0 auto; padding:28px 18px 80px; }
  h1 { font-size:22px; font-weight:600; margin:0 0 4px; }
  p.sub { color:var(--mut); margin:0 0 22px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:6px 18px; margin:12px 0; }
  .small { font-size:13px; color:var(--mut); }
  .err { color:#ff9a9a; }
  .lloj { display:flex; gap:14px; align-items:flex-start; padding:14px 0; border-bottom:1px solid #20242e; }
  .lloj.klik { cursor:pointer; }
  .nr { min-width:26px; text-align:center; font-size:18px; font-weight:700; color:var(--mut); padding-top:2px; }
  .notes { display:flex; flex-direction:column; gap:6px; min-width:96px; }
  .note { font-weight:700; font-size:15px; border-radius:8px; padding:4px 6px; text-align:center; }
  .note small { display:block; font-weight:500; font-size:10px; opacity:.8; text-transform:uppercase; }
  .hi { background:rgba(79,191,133,.15); color:var(--good); }
  .mid { background:rgba(240,184,102,.15); color:var(--warn); }
  .lo { background:rgba(154,163,178,.12); color:var(--mut); }
  .emri { font-weight:600; font-size:16px; }
  .kat { color:var(--p); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin:5px 0; }
  .chip { font-size:12px; background:#0b0d12; border:1px solid var(--line); border-radius:20px; padding:2px 9px; color:var(--mut); }
  .badge-b { background:rgba(183,148,246,.15); color:var(--p); border:1px solid #3a2a5a; border-radius:20px; padding:1px 9px; font-size:11px; }
  .perb { font-size:12px; color:#9a86c0; margin-top:3px; }
  .arrow { color:var(--mut); font-size:13px; padding-top:4px; }
  .nenwrap { margin:6px 0 0 40px; border-left:2px solid #3a2a5a; padding-left:14px; }
  .hide { display:none; }
  .nen { padding:8px 0; border-bottom:1px solid #1a1d25; cursor:pointer; }
  .nen-head { display:flex; gap:10px; align-items:flex-start; }
  .nnote { font-weight:700; font-size:13px; border-radius:6px; padding:2px 5px; text-align:center; min-width:52px; }
  .nnote small { display:block; font-weight:500; font-size:9px; opacity:.8; }
  .nemri { font-weight:600; font-size:14px; }
  .bg-bashkuar { background:#1c1530; border-color:#3a2a5a; }
  .hapwrap { margin:8px 0 4px 20px; }
  .hap-card { background:#0b0d12; border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin:6px 0; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid var(--mut); border-top-color:transparent; border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes s { to { transform:rotate(360deg); } }
  .hbtn { font-size:12px; padding:5px 10px; background:transparent; border:1px solid var(--line); border-radius:8px; cursor:pointer; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Përfundimi — llojet 20/20 të kategorisë</h1>
  <p class="sub">Kliko një term për nën-llojet. Kliko një nën-lloj për hapësirat e tij (nëse janë studiuar). Studimi i hapësirës bëhet me butonin te secili term.</p>

  <div id="out"><div class="card small" style="padding:16px">Po ngarkohet…</div></div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const esc = s => (s==null?'':String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const cls = n => { n=Number(n)||0; return n>=8?'hi':(n>=5?'mid':'lo'); };
  const cls100 = n => { n=Number(n)||0; return n>=60?'hi':(n>=30?'mid':'lo'); };

  let ROWS = [];
  const hapCache = {}; // lloj_emri -> { nendhoj_emri -> {automatizim, monetizim, ...} }
  const hapTimers = {};

  async function load() {
    try {
      const rows = await (await fetch('/perfundimi/lloje')).json();
      if (!Array.isArray(rows) || !rows.length) {
        $('out').innerHTML = '<div class="card small" style="padding:16px">Asnjë lloj 20/20. Gjenero te /kategoria.</div>';
        return;
      }
      ROWS = rows;
      const nrBashkuar = rows.filter(r => r.tip==='bashkuar').length;
      let html = `<div class="card" style="display:flex;gap:24px;align-items:center;padding:14px 18px;">
        <div><div style="font-size:26px;font-weight:700;color:var(--acc)">${rows.length}</div><div class="small">terma gjithsej</div></div>
        <div><div style="font-size:26px;font-weight:700;color:var(--p)">${nrBashkuar}</div><div class="small">të bashkuar</div></div>
      </div><div class="card">`;

      let nr = 0;
      rows.forEach((r, i) => {
        nr++;
        const bashkuar = r.tip==='bashkuar';
        const subs = r.nendhojet || [];
        html += `<div class="lloj ${bashkuar?'bg-bashkuar':''} ${subs.length?'klik':''}" data-i="${i}" style="${bashkuar?'padding-left:8px;padding-right:8px;border-radius:8px;':''}">
          <div class="nr">${nr}</div>
          <div class="notes">
            <div class="note ${cls(r.note_pershtatje)}">${esc(r.note_pershtatje)}/10<small>Përputhje</small></div>
            <div class="note ${cls(r.fitimi_neto)}">${r.fitimi_neto==null?'—':esc(r.fitimi_neto)+'/10'}<small>Fitim neto</small></div>
          </div>
          <div style="flex:1">
            <div class="emri">${esc(r.emri)} ${bashkuar?'<span class="badge-b">i bashkuar</span>':''}</div>
            <div class="kat">${esc(r.kategoria)}</div>
            <div class="chips">
              <span class="chip">${esc(r.tregu)}</span>
              <span class="chip">Global: ${esc(r.potencial_global)}</span>
              <span class="chip">Hapësirë: ${esc(r.note_hapesire)}/10</span>
              <span class="chip">Kulmi: ${esc(r.koha_kulm)}</span>
            </div>
            ${ bashkuar && r.perberesit ? `<div class="perb">Përfshin: ${esc(r.perberesit)}</div>` : '' }
            <div style="margin-top:6px;">
              <button class="hbtn hap-btn" data-lloj="${esc(r.emri)}" data-hi="${i}" style="color:var(--acc);">Studjo hapësirën</button>
              <span class="small" id="hs${i}" style="margin-left:8px;"></span>
            </div>
          </div>
          <div class="arrow">${ subs.length ? '▾ '+subs.length+' nën-lloje' : '' }</div>
        </div>
        <div class="nenwrap hide" id="nw${i}"></div>`;
      });
      html += '</div>';
      $('out').innerHTML = html;

      // Ngarko hapesirat e ruajtura per cdo term (pa kosto), qe nen-llojet t'i kene gati
      for (const r of rows) {
        try {
          const hrows = await (await fetch('/perfundimi/hapesira/'+encodeURIComponent(r.emri))).json();
          const map = {};
          if (Array.isArray(hrows)) for (const h of hrows) map[h.nendhoj_emri] = h;
          hapCache[r.emri] = map;
        } catch(e) { hapCache[r.emri] = {}; }
      }
    } catch(e) { $('out').innerHTML = `<div class="card err">${esc(e.message)}</div>`; }
  }

  // Klik mbi term -> hap nen-llojet
  document.addEventListener('click', (e) => {
    const hb = e.target.closest('.hap-btn');
    if (hb) { e.stopPropagation(); nisHapesire(hb.getAttribute('data-lloj'), hb.getAttribute('data-hi')); return; }

    const nen = e.target.closest('.nen');
    if (nen) { e.stopPropagation(); toggleNen(nen); return; }

    const el = e.target.closest('.lloj.klik');
    if (el) {
      const i = el.getAttribute('data-i');
      const r = ROWS[i];
      if (!(r.nendhojet||[]).length) return;
      const wrap = $('nw'+i);
      wrap.classList.toggle('hide');
      if (wrap.dataset.done) return;
      wrap.dataset.done = '1';
      const map = hapCache[r.emri] || {};
      let h = '';
      r.nendhojet.forEach((n, k) => {
        const hap = map[n.emri];
        h += `<div class="nen" data-term="${esc(r.emri)}" data-nen="${esc(n.emri)}">
          <div class="nen-head">
            <div style="display:flex;gap:6px;">
              <div class="nnote ${cls(n.potenciali)}">${esc(n.potenciali)}/10<small>Potencial</small></div>
              ${ hap ? `<div class="nnote ${cls100(hap.vleresim_pergjithshem)}">${esc(hap.vleresim_pergjithshem)}/100<small>Hapësirë</small></div>` : '' }
            </div>
            <div style="flex:1">
              <div class="nemri">${esc(n.emri)}</div>
              <div class="kat">${esc(n.kategoria)}</div>
              <div class="chips">
                <span class="chip">${esc(n.tregu)}</span>
                <span class="chip">${n.global==='po'?'Global':'Jo-global'}</span>
                <span class="chip">Kulmi: ${esc(n.koha_kulm)}</span>
                ${ hap ? '<span class="chip" style="color:var(--good)">▾ hapësirat</span>' : '<span class="chip">pa hapësira ende</span>' }
              </div>
            </div>
          </div>
          <div class="hapwrap hide" id="hw-${i}-${k}"></div>
        </div>`;
      });
      wrap.innerHTML = h;
    }
  });

  function toggleNen(nenEl) {
    const term = nenEl.getAttribute('data-term');
    const nen = nenEl.getAttribute('data-nen');
    const box = nenEl.querySelector('.hapwrap');
    if (!box) return;
    box.classList.toggle('hide');
    if (box.dataset.done) return;
    const map = hapCache[term] || {};
    const hap = map[nen];
    if (!hap) { box.innerHTML = '<div class="small">Pa hapësira ende — kliko "Studjo hapësirën" te termi.</div>'; box.dataset.done='1'; return; }
    box.dataset.done = '1';
    box.innerHTML = `<div class="hap-card">
      <div class="small" style="margin-bottom:8px;">${esc(hap.pershkrim_kryesor)}</div>
      <div style="display:flex;gap:12px;">
        <div style="flex:1">
          <div style="font-weight:600;font-size:12px;color:var(--acc);margin-bottom:6px;">AUTOMATIZIM</div>
          ${ (hap.automatizim||[]).map(hapRresht).join('') || '<div class="small">—</div>' }
        </div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:12px;color:var(--good);margin-bottom:6px;">VLERË MONETARE</div>
          ${ (hap.monetizim||[]).map(hapRresht).join('') || '<div class="small">—</div>' }
        </div>
      </div>
    </div>`;
  }

  function hapRresht(x){
    const v = Number(x.vleresim)||0;
    const c = v>=60?'var(--good)':(v>=30?'var(--warn)':'var(--mut)');
    return `<div style="border-left:2px solid ${c};padding:4px 0 4px 8px;margin-bottom:6px;">
      <div style="font-size:13px;">${esc(x.pershkrim)}</div>
      <div class="small"><b style="color:${c}">${esc(x.vleresim)}/100</b>${ x.ekziston && String(x.ekziston).toLowerCase()!=='jo' ? ' · Ekziston: '+esc(x.ekziston) : '' }</div>
    </div>`;
  }

  async function nisHapesire(lloj, i) {
    const btn = document.querySelector(`.hap-btn[data-hi="${i}"]`);
    const st = $('hs'+i);
    if (!confirm('Studimi bën kërkime me web search për çdo nën-lloj (ka kosto). Vazhdo?')) return;
    if (btn) btn.disabled = true;
    st.innerHTML = '<span class="spin"></span>Po nis…';
    try {
      const { run, error } = await (await fetch('/perfundimi/hapesira/nis',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lloj})})).json();
      if (error || !run) throw new Error(error||'S\'u nis dot.');
      if (hapTimers[i]) clearInterval(hapTimers[i]);
      hapTimers[i] = setInterval(async () => {
        try {
          const j = await (await fetch('/perfundimi/hapesira/status/'+run)).json();
          if (j.status==='po_punon'){ st.innerHTML=`<span class="spin"></span>${esc(j.faza||'')} ${esc(j.progres||'')}`; }
          else if (j.status==='gati'){ clearInterval(hapTimers[i]); st.innerHTML='<span style="color:var(--good)">Mbaroi ✓ — rifresko për t\'i parë</span>'; if(btn) btn.disabled=false; }
          else if (j.status==='gabim'){ clearInterval(hapTimers[i]); st.innerHTML=`<span class="err">${esc(j.error)}</span>`; if(btn) btn.disabled=false; }
          else if (j.status==='pa_gjetur'){ clearInterval(hapTimers[i]); st.innerHTML='<span class="err">Humbi.</span>'; if(btn) btn.disabled=false; }
        } catch(e){}
      }, 3000);
    } catch(e){ st.innerHTML=`<span class="err">${esc(e.message)}</span>`; if(btn) btn.disabled=false; }
  }

  load();
</script>
</body>
</html>
