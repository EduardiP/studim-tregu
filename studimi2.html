<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Studimi 2 — sherbim B2B qe zgjat</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --line:#2a2f3a; --txt:#e7e9ee; --mut:#9aa3b2; --acc:#6ea8fe; --good:#4fbf85; --warn:#f0b866; --p:#b794f6; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:16px/1.6 system-ui,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:900px; margin:0 auto; padding:28px 18px 80px; }
  h1 { font-size:22px; font-weight:600; margin:0 0 4px; }
  p.sub { color:var(--mut); margin:0 0 22px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:12px 0; }
  .small { font-size:13px; color:var(--mut); }
  .err { color:#ff9a9a; }
  button.nis { font-size:15px; padding:10px 18px; background:var(--acc); color:#0b0d12; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
  button.nis:disabled { opacity:.5; cursor:default; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid var(--mut); border-top-color:transparent; border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes s { to { transform:rotate(360deg); } }
  .nivel-h { font-size:13px; color:var(--p); text-transform:uppercase; letter-spacing:.05em; margin:22px 0 6px; font-weight:600; }
  .hap { display:flex; gap:14px; padding:14px 0; border-bottom:1px solid #20242e; align-items:flex-start; }
  .pike { min-width:60px; text-align:center; }
  .pike .n { font-size:24px; font-weight:700; line-height:1; }
  .pike .l { font-size:10px; color:var(--mut); }
  .hi { color:var(--good); } .mid { color:var(--warn); } .lo { color:var(--mut); }
  .lloji { color:var(--acc); font-size:12px; text-transform:uppercase; letter-spacing:.03em; margin-bottom:3px; }
  .step { font-size:11px; color:var(--mut); }
  .forca { font-size:11px; padding:1px 7px; border-radius:9px; margin-left:6px; }
  .f-dobet { background:#173a2a; color:var(--good); } .f-mesatare { background:#3a3117; color:var(--warn); } .f-forte { background:#3a1f22; color:#ff9a9a; }
  .ideja { font-size:14px; white-space:pre-wrap; }
  .konk { font-size:12px; color:var(--mut); margin-top:8px; border-top:1px dashed #2a2f3a; padding-top:6px; white-space:pre-wrap; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Studimi 2 — shërbim B2B ku bizneset kanë nevojë vazhdimisht</h1>
  <p class="sub">2 ide, secila e thelluar deri në 3 logjikime + 3 kërkime (mbimurim mbi defektet e konkurrentëve). Logjikë gpt-5.5, verifikim gpt-5.4.</p>

  <div class="card">
    <button class="nis" id="nisBtn">Nis studimin</button>
    <span class="small" id="status" style="margin-left:10px;"></span>
    <div class="small" style="margin-top:8px;">Bën kërkime me web search (ka kosto). Punon në sfond — mund ta mbyllësh faqen dhe të kthehesh.</div>
  </div>

  <div id="out"></div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const esc = s => (s==null?'':String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const cls = n => { n=Number(n)||0; return n>=60?'hi':(n>=30?'mid':'lo'); };
  let timer = null;

  function render(rows) {
    if (!Array.isArray(rows) || !rows.length) { $('out').innerHTML=''; return; }
    let html = '', lastNivel = 0;
    for (const r of rows) {
      if (r.niveli !== lastNivel) {
        if (lastNivel !== 0) html += '</div>';
        html += `<div class="nivel-h">Ideja ${esc(r.niveli)}</div><div class="card">`;
        lastNivel = r.niveli;
      }
      const fclass = r.forca_konkurrences === 'dobet' ? 'f-dobet' : (r.forca_konkurrences === 'forte' ? 'f-forte' : 'f-mesatare');
      html += `<div class="hap">
        <div class="pike"><div class="n ${cls(r.vleresim)}">${esc(r.vleresim)}</div><div class="l">/100</div></div>
        <div style="flex:1">
          <div class="lloji">${esc(r.lloji)} <span class="step">· logjikimi ${esc(r.logjikimi)}</span>${ r.forca_konkurrences ? `<span class="forca ${fclass}">${esc(r.forca_konkurrences)}</span>` : '' }</div>
          <div class="ideja">${esc(r.ideja)}</div>
          ${ r.konkurrenca ? `<div class="konk"><b>Konkurrenca + defektet:</b> ${esc(r.konkurrenca)}</div>` : '' }
        </div>
      </div>`;
    }
    if (lastNivel !== 0) html += '</div>';
    $('out').innerHTML = html;
  }

  async function ngarkoFundit() {
    try { const j = await (await fetch('/studimi2/fundit')).json(); if (j.rows) render(j.rows); } catch(e) {}
  }

  async function nis() {
    if (!confirm('Nis studimin? Bën deri në 6 logjikime + 6 kërkime (ka kosto).')) return;
    $('nisBtn').disabled = true;
    $('status').innerHTML = '<span class="spin"></span>po nis…';
    try {
      const { run, error } = await (await fetch('/studimi2/nis',{method:'POST'})).json();
      if (error || !run) throw new Error(error||'S\'u nis dot.');
      if (timer) clearInterval(timer);
      timer = setInterval(async () => {
        try {
          const j = await (await fetch('/studimi2/status/'+run)).json();
          if (j.status==='po_punon') {
            $('status').innerHTML = `<span class="spin"></span>${esc(j.faza||'')} ${j.progres?('('+esc(j.progres)+')'):''}`;
            const r = await (await fetch('/studimi2/rezultat/'+run)).json();
            render(r);
          } else if (j.status==='gati') {
            clearInterval(timer);
            $('status').innerHTML = '<span style="color:var(--good)">Mbaroi ✓</span>';
            $('nisBtn').disabled = false;
            const r = await (await fetch('/studimi2/rezultat/'+run)).json();
            render(r);
          } else if (j.status==='gabim') {
            clearInterval(timer);
            $('status').innerHTML = `<span class="err">${esc(j.error)}</span>`;
            $('nisBtn').disabled = false;
          } else if (j.status==='pa_gjetur') {
            clearInterval(timer);
            $('status').innerHTML = '<span class="err">Humbi.</span>';
            $('nisBtn').disabled = false;
          }
        } catch(e) {}
      }, 3000);
    } catch(e) {
      $('status').innerHTML = `<span class="err">${esc(e.message)}</span>`;
      $('nisBtn').disabled = false;
    }
  }

  $('nisBtn').addEventListener('click', nis);
  ngarkoFundit();
</script>
</body>
</html>
