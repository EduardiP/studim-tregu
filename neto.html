<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fitimi neto — llojet</title>
<style>
  :root { --bg:#0f1115; --card:#171a21; --line:#2a2f3a; --txt:#e7e9ee; --mut:#9aa3b2; --acc:#6ea8fe; --good:#4fbf85; --p:#b794f6; --warn:#f0b866; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font:16px/1.6 system-ui,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:920px; margin:0 auto; padding:28px 18px 80px; }
  h1 { font-size:22px; font-weight:600; margin:0 0 4px; }
  p.sub { color:var(--mut); margin:0 0 20px; }
  button { background:var(--acc); color:#06122b; border:0; border-radius:10px; padding:11px 18px; font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin:14px 0; }
  .small { font-size:13px; color:var(--mut); }
  .row { display:flex; gap:14px; align-items:flex-start; padding:11px 0; border-bottom:1px solid #20242e; }
  .neto { font-weight:700; font-size:18px; min-width:64px; text-align:center; border-radius:8px; padding:5px 0; }
  .neto small { display:block; font-size:10px; font-weight:500; opacity:.85; text-transform:uppercase; }
  .hi { background:rgba(79,191,133,.15); color:var(--good); }
  .mid { background:rgba(240,184,102,.15); color:var(--warn); }
  .lo { background:rgba(154,163,178,.12); color:var(--mut); }
  .emri { font-weight:600; font-size:15px; }
  .kat { color:var(--p); font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin:4px 0; }
  .chip { font-size:12px; background:#0b0d12; border:1px solid var(--line); border-radius:20px; padding:2px 9px; color:var(--mut); }
  .arsye { font-size:13px; color:var(--mut); margin-top:3px; }
  .err { color:#ff9a9a; } .ok { color:var(--good); }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid var(--mut); border-top-color:transparent; border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; margin-right:6px; }
  @keyframes s { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Fitimi neto — renditje e re e llojeve</h1>
  <p class="sub">Merr llojet e ruajtura te /ide dhe i rendit sipas fitimit neto (sa mbetet realisht në xhep pas shpenzimeve, taksave, CAC). Model i lirë, një thirrje — kosto disa qindarka.</p>

  <div class="card">
    <button id="nis">Llogarit fitimin neto</button>
    <span id="status" class="small" style="margin-left:10px;"></span>
    <div style="margin-top:8px;"><span class="small" style="cursor:pointer;color:var(--acc)" id="refresh">↻ Shfaq të ruajturat</span></div>
  </div>

  <div id="out"></div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const esc = s => (s==null?'':String(s)).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const cls = n => { n=Number(n)||0; return n>=8?'hi':(n>=5?'mid':'lo'); };
  let timer=null;

  function render(rows){
    if (!Array.isArray(rows) || !rows.length){ $('out').innerHTML='<div class="card small">Ende asgjë. Kliko "Llogarit fitimin neto".</div>'; return; }
    let html='<div class="card">';
    for (const r of rows){
      const neto = (r.fitimi_neto==null) ? '—' : r.fitimi_neto+'/10';
      html += `<div class="row">
        <div class="neto ${cls(r.fitimi_neto)}">${esc(neto)}<small>Fitim neto</small></div>
        <div style="flex:1">
          <div class="emri">${esc(r.emri)}</div>
          <div class="kat">${esc(r.kategoria)}</div>
          <div class="chips">
            <span class="chip">${esc(r.tregu)}</span>
            <span class="chip">Global: ${esc(r.potencial_global)}</span>
            <span class="chip">Përputhje: ${esc(r.note_pershtatje)}/10</span>
            <span class="chip">Hapësirë: ${esc(r.note_hapesire)}/10</span>
          </div>
          ${ r.neto_arsye ? `<div class="arsye">${esc(r.neto_arsye)}</div>` : '' }
        </div>
      </div>`;
    }
    html += '</div>';
    $('out').innerHTML = html;
  }

  async function load(){
    try { render(await (await fetch('/neto/lloje')).json()); }
    catch(e){ $('out').innerHTML=`<div class="card err">S'u ngarkua: ${esc(e.message)}</div>`; }
  }

  async function nis(){
    if (timer){ clearInterval(timer); timer=null; }
    $('nis').disabled=true;
    $('status').innerHTML='<span class="spin"></span>Po llogarit…';
    try {
      const { run, error } = await (await fetch('/neto/nis',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'})).json();
      if (error || !run) throw new Error(error||'S\'u nis dot.');
      timer = setInterval(async () => {
        try {
          const j = await (await fetch('/neto/status/'+run)).json();
          if (j.status==='gati'){ clearInterval(timer); timer=null; $('status').innerHTML='<span class="ok">Mbaroi ✓</span>'; $('nis').disabled=false; load(); }
          else if (j.status==='gabim'){ clearInterval(timer); timer=null; $('status').innerHTML=`<span class="err">${esc(j.error)}</span>`; $('nis').disabled=false; }
          else if (j.status==='pa_gjetur'){ clearInterval(timer); timer=null; $('status').innerHTML='<span class="err">Humbi.</span>'; $('nis').disabled=false; }
        } catch(e){}
      }, 2500);
    } catch(e){ $('status').innerHTML=`<span class="err">Gabim: ${esc(e.message)}</span>`; $('nis').disabled=false; }
  }

  $('nis').addEventListener('click', nis);
  $('refresh').addEventListener('click', load);
  load();
</script>
</body>
</html>
